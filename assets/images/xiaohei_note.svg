<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <!-- 小黑：盯着一个大音符（要听音乐吗） -->
  <g fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M88 196 L84 226"/>
    <path d="M118 196 L122 226"/>
  </g>
  <!-- 身体偏左 -->
  <path d="M104 40 C64 40 50 86 50 130 C50 178 72 200 104 200 C138 200 160 178 160 130 C160 86 144 40 104 40 Z"
        fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="86" cy="116" r="13" fill="#fff"/>
  <circle cx="124" cy="116" r="13" fill="#fff"/>
  <!-- 眼睛朝右看音符 -->
  <circle cx="91" cy="116" r="4.5" fill="#1a1a1a"/>
  <circle cx="129" cy="116" r="4.5" fill="#1a1a1a"/>
  <!-- 细胳膊指向音符 -->
  <path d="M150 150 L182 150" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <!-- 大音符（橙色，主元素） -->
  <g stroke="#e8730c" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M200 70 L200 168"/>
    <path d="M200 70 C214 72 224 78 224 92"/>
  </g>
  <circle cx="190" cy="170" r="13" fill="#e8730c"/>
</svg>
